spring:

  datasource:
    url: jdbc:postgresql://localhost:5432/async_data_platform
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: validate
      open-in-view: false

    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379

management:
  endpoints:
    web:
      exposure:
        include: "*"
springdoc:
  swagger-ui:
    path: /swagger-ui.html